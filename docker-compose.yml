services:

  # ---------------------------------------------------------------------------
  # energy-service — optimisation engine, external API integrations
  # http://localhost:8001
  # ---------------------------------------------------------------------------
  energy-service:
    build:
      context: ./energy-service
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./energy-service:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_KEY: ${ENERGY_SERVICE_APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: energy_service
      DB_USERNAME: ${MYSQL_USER:-sail}
      DB_PASSWORD: ${MYSQL_PASSWORD:-password}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SOLAX_TOKEN_ID: ${SOLAX_TOKEN_ID}
      SOLAX_WIFI_SN: ${SOLAX_WIFI_SN}
      SOLAX_BASE_URL: ${SOLAX_BASE_URL:-https://global.solaxcloud.com}
      OCTOPUS_API_KEY: ${OCTOPUS_API_KEY}
      OCTOPUS_ACCOUNT_NUMBER: ${OCTOPUS_ACCOUNT_NUMBER}
      OCTOPUS_MPAN: ${OCTOPUS_MPAN}
      OCTOPUS_SERIAL_NUMBER: ${OCTOPUS_SERIAL_NUMBER}
      OCTOPUS_BASE_URL: ${OCTOPUS_BASE_URL:-https://api.octopus.energy}
      OCTOPUS_CHEAP_RATE_PENCE: ${OCTOPUS_CHEAP_RATE_PENCE:-7.5}
      OCTOPUS_DAY_RATE_PENCE: ${OCTOPUS_DAY_RATE_PENCE:-24.0}
      OCTOPUS_CHEAP_START: ${OCTOPUS_CHEAP_START:-23:30}
      OCTOPUS_CHEAP_END: ${OCTOPUS_CHEAP_END:-05:30}
      BATTERY_TOTAL_CAPACITY_KWH: ${BATTERY_TOTAL_CAPACITY_KWH:-11.6}
      BATTERY_USABLE_CAPACITY_KWH: ${BATTERY_USABLE_CAPACITY_KWH:-8.1}
      BATTERY_CHARGE_CEILING_PCT: ${BATTERY_CHARGE_CEILING_PCT:-70}
      BATTERY_CHARGE_RATE_KW: ${BATTERY_CHARGE_RATE_KW:-3.5}
      SOLAR_LATITUDE: ${SOLAR_LATITUDE:-51.7}
      SOLAR_LONGITUDE: ${SOLAR_LONGITUDE:--2.2}
      SOLAR_GROUP5_AZIMUTH: ${SOLAR_GROUP5_AZIMUTH:-181}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - solar

  # ---------------------------------------------------------------------------
  # energy-bff — backend for frontend, auth, aggregation
  # http://localhost:8002
  # ---------------------------------------------------------------------------
  energy-bff:
    build:
      context: ./energy-bff
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    volumes:
      - ./energy-bff:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_KEY: ${ENERGY_BFF_APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: energy_bff
      DB_USERNAME: ${MYSQL_USER:-sail}
      DB_PASSWORD: ${MYSQL_PASSWORD:-password}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ENERGY_SERVICE_URL: http://energy-service:8000
      SANCTUM_STATEFUL_DOMAINS: localhost:3000
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      energy-service:
        condition: service_started
    networks:
      - solar

  # ---------------------------------------------------------------------------
  # worker — Laravel queue worker + scheduler for energy-service
  # Runs scheduled data-collection jobs (battery every 15 min, forecast daily,
  # consumption every hour) and processes the Redis job queue.
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./energy-service
      dockerfile: Dockerfile
    command: sh -c "php artisan queue:work --sleep=3 --tries=3 --max-time=3600 & php artisan schedule:work"
    volumes:
      - ./energy-service:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_KEY: ${ENERGY_SERVICE_APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: energy_service
      DB_USERNAME: ${MYSQL_USER:-sail}
      DB_PASSWORD: ${MYSQL_PASSWORD:-password}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SOLAX_TOKEN_ID: ${SOLAX_TOKEN_ID}
      SOLAX_WIFI_SN: ${SOLAX_WIFI_SN}
      SOLAX_BASE_URL: ${SOLAX_BASE_URL:-https://global.solaxcloud.com}
      OCTOPUS_API_KEY: ${OCTOPUS_API_KEY}
      OCTOPUS_ACCOUNT_NUMBER: ${OCTOPUS_ACCOUNT_NUMBER}
      OCTOPUS_MPAN: ${OCTOPUS_MPAN}
      OCTOPUS_SERIAL_NUMBER: ${OCTOPUS_SERIAL_NUMBER}
      OCTOPUS_BASE_URL: ${OCTOPUS_BASE_URL:-https://api.octopus.energy}
      OCTOPUS_CHEAP_RATE_PENCE: ${OCTOPUS_CHEAP_RATE_PENCE:-7.5}
      OCTOPUS_DAY_RATE_PENCE: ${OCTOPUS_DAY_RATE_PENCE:-24.0}
      OCTOPUS_CHEAP_START: ${OCTOPUS_CHEAP_START:-23:30}
      OCTOPUS_CHEAP_END: ${OCTOPUS_CHEAP_END:-05:30}
      BATTERY_TOTAL_CAPACITY_KWH: ${BATTERY_TOTAL_CAPACITY_KWH:-11.6}
      BATTERY_USABLE_CAPACITY_KWH: ${BATTERY_USABLE_CAPACITY_KWH:-8.1}
      BATTERY_CHARGE_CEILING_PCT: ${BATTERY_CHARGE_CEILING_PCT:-70}
      BATTERY_CHARGE_RATE_KW: ${BATTERY_CHARGE_RATE_KW:-3.5}
      SOLAR_LATITUDE: ${SOLAR_LATITUDE:-51.7}
      SOLAR_LONGITUDE: ${SOLAR_LONGITUDE:--2.2}
      SOLAR_GROUP5_AZIMUTH: ${SOLAR_GROUP5_AZIMUTH:-181}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      energy-service:
        condition: service_started
    networks:
      - solar

  # ---------------------------------------------------------------------------
  # energy-ui — React SPA (development server with HMR)
  # http://localhost:3000
  # ---------------------------------------------------------------------------
  energy-ui:
    build:
      context: ./energy-ui
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./energy-ui:/app
      - /app/node_modules
    environment:
      VITE_BFF_URL: http://energy-bff:8000
    depends_on:
      - energy-bff
    networks:
      - solar

  # ---------------------------------------------------------------------------
  # Shared MySQL 8 instance — separate databases per service
  # host port 3307 to avoid conflicts with a local MySQL
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${MYSQL_USER:-sail}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sail", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - solar

  # ---------------------------------------------------------------------------
  # Shared Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - solar

volumes:
  mysql_data:
  redis_data:

networks:
  solar:
    driver: bridge
