server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the SPA — all client-side routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api calls to the BFF (set ENERGY_BFF_HOST via env in production)
    location /api/ {
        proxy_pass http://energy-bff:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
